<!DOCTYPE html>
<html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Convertidor de Archivos JPG a PDF</title>

        <!-- Favicon -->
        <link rel="icon" type="image/x-icon" href="assets/devil.ico" />
        <!-- Bootstrap icons -->
        <link href="css/bootstrap-icons.css" rel="stylesheet" />

        <!-- Bootstrap CSS -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
        <!-- Claude CSS -->
        <link rel="stylesheet" href="css/claude_rem.css" />

    </head>

    <body>

        <div class="container">

            <!-- NAV BAR -->
            <div id="container-log" class="row d-block header-n">
                <nav id="nav-log" class="navbar">
                    <div id="header-img" class="container-fluid">
                        <a class="navbar-brand" href="#">
                            <img class="d-inline-block logo-image" src="img/pdf.svg" alt="Logo" width="">
                        </a>
                    </div>
                </nav>
            </div>

            <!-- Container -->
            <div class="container-fluid">
                <!-- SELECCION DE ARCHIVOS -->
                <div class="row">
                    <div class="col-12 mb-3">
                        <input type="file" id="fileInput" class="form-control form-control-sm" accept=".jpg,.jpeg"
                            multiple />
                        <div id="fileList" class="mt-3"></div>
                        <div id="processingStatus" class="mt-2 text-info" style="display:none;">
                            <span class="spinner-border spinner-border-sm" role="status"></span>
                            Procesando y mejorando imágenes...
                        </div>
                    </div>
                </div>

                <!-- Construccion de lista de archivos -->
                <div class="row" id="row">

                    <div class="card mt-3">
                        <div class="card-header">
                            <span class="titulo" id="titulo">Archivos Seleccionados</span>
                        </div>

                        <div class="card-body">

                            <!-- Encabezado de lista -->
                            <div style="display: flex; align-items: center; padding: 4px 4px 6px; border-bottom: 2px solid #3a3a3a; font-weight: 600; font-size: 0.8rem;">
                                <span style="flex: 1;">PDF Generado</span>
                                <span style="width: 70px; text-align: center;">Acciones</span>
                            </div>

                            <!-- Filas de archivos -->
                            <div id="selectedFilesBody"></div>

                        </div>
                    </div>

                </div>

                <!-- Boton guardar -->
                <div class="col-4 offset-md-8">
                    <div class="btn-group w-100">
                        <button id="convertButton" class="btn btn-outline-light text-info btn-sm"
                            disabled>Guardar</button>
                    </div>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="container" id="footer">

                <footer>
                    <div class="container">
                        <div class="row" id="">
                            <p class="mb-0 footer-rem">...</p>
                        </div>
                    </div>
                </footer>

            </div>

        </div>

        <script src="js/pdf-lib.min.js"></script>
        <script src="js/claude-file-converter.js"></script>
        <!-- Bootstrap JS Bundle (incluye Popper) -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Opcional: Mejor UI vía CDN -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    </body>

</html>
