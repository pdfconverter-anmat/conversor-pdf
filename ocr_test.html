<!DOCTYPE html>

<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>OCR Lote ANMAT</title>

<link rel="stylesheet" href="css/ocr_lote.css">

</head>

<body>

<div class="container">


<h2>OCR Lote - Disposiciones ANMAT</h2>

<div class="toolbar">

    <input
        type="file"
        id="imageInput"
        accept=".jpg,.jpeg"
        multiple>

    <button id="processBtn">
        Procesar
    </button>

    <button id="downloadBtn" disabled>
        Descargar ZIP
    </button>

</div>

<div class="status">

    <div>
        Archivos:
        <span id="totalFiles">0</span>
    </div>

    <div>
        Procesados:
        <span id="processedFiles">0</span>
    </div>

</div>

<div class="progress">

    <div id="progressBar"></div>

</div>

<div class="layout">

    <div class="panel">

        <h3>Archivos seleccionados</h3>

        <div id="fileList"></div>

    </div>

    <div class="panel">

        <h3>Resultado OCR</h3>

        <div id="resultList"></div>

    </div>

</div>


</div>

<script src="js/ocr_lote.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

</body>
</html>
