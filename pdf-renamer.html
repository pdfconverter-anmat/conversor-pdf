<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Renombrador de PDFs - ANMAT</title>

    <link rel="icon" type="image/x-icon" href="assets/devil.ico" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/claude_rem.css" />

    <!-- ProgressBar.js -->
    <script src="https://cdn.jsdelivr.net/npm/progressbar.js@1.1.1/dist/progressbar.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="container-log" class="row d-block header-n">
            <nav class="navbar">
                <div class="container-fluid">
                    <a class="navbar-brand" href="#">
                        <img class="d-inline-block logo-image" src="img/pdf.svg" alt="Logo">
                    </a>
                </div>
            </nav>
        </div>

        <div class="container-fluid mt-2">
            <h4 class="mb-2">Renombrador de PDFs (Formato ANMAT) - ZIP</h4>
            
            <div class="row">
                <div class="col-12 mb-3">
                    <input type="file" id="pdfInput" accept=".pdf" multiple class="form-control form-control-sm">
                    <small class="text-muted">Selecciona los PDFs con nombre antiguo</small>
                </div>
            </div>

            <div class="card mt-3">
                <div class="card-header">
                    <span class="titulo">Archivos listos para renombrar</span>
                </div>
                <div class="card-body">
                    <div id="fileList" class="list-group"></div>
                </div>
            </div>

            <!-- Barra de progreso -->
            <div id="progressContainer" class="mt-4" style="display:none;">
                <div class="d-flex justify-content-between mb-1">
                    <small>Generando ZIP...</small>
                    <small id="progressText">0%</small>
                </div>
                <div id="progressBar" style="height: 8px;"></div>
            </div>

            <div class="row mt-3">
                <div class="col-12">
                    <button id="generateZipButton" class="btn btn-outline-light text-info btn-sm w-100" disabled>
                        Generar ZIP y Descargar
                    </button>
                </div>
            </div>
        </div>

        <footer class="mt-4">
            <div class="container">
                <p class="mb-0 footer-rem text-end">Renombrador de PDFs • Conversor ANMAT</p>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="js/claude_new_format.js"></script>
</body>
</html>
